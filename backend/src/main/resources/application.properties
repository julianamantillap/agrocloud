# Conexion a PostgreSQL
# Ajusta usuario, contrasena y nombre de base de datos segun tu entorno local
spring.datasource.url=jdbc:postgresql://localhost:5432/agrocloud
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate: valida que las entidades coincidan con las tablas ya creadas
# (usamos el schema.sql de la carpeta database/, no dejamos que Hibernate cree las tablas)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Puerto del servidor (opcional, 8080 es el default)
server.port=8080
